version: "3.8"

services:
  odin-voice:
    build: .
    container_name: odin-voice
    restart: unless-stopped
    ports:
      - "7431:3001"
    environment:
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ODIN_APP_URL=${ODIN_APP_URL}
      - PORT=3001
      - VOICE_SERVER_URL=${VOICE_SERVER_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Traefik v3 maneja WebSocket automáticamente — sin labels duplicados
      - "traefik.http.routers.odin-voice-https.rule=Host(`voice-odin.duckdns.org`)"
      - "traefik.http.routers.odin-voice-https.entrypoints=websecure"
      - "traefik.http.routers.odin-voice-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.odin-voice-https.service=odin-voice-svc"
      - "traefik.http.routers.odin-voice-http.rule=Host(`voice-odin.duckdns.org`)"
      - "traefik.http.routers.odin-voice-http.entrypoints=web"
      - "traefik.http.routers.odin-voice-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.odin-voice-http.service=odin-voice-svc"
      - "traefik.http.services.odin-voice-svc.loadbalancer.server.port=3001"
      - "traefik.http.services.odin-voice-svc.loadbalancer.passHostHeader=true"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
